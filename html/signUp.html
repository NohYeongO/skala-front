<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; object-src 'none'; base-uri 'self'"
    />
    <title>회원가입 · 노영오 여행 일지</title>
    <script src="../script/theme.js"></script>
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/auth.css" />
    <script type="module" src="../script/signup.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#signupForm">본문 바로가기</a>

    <main class="auth-page">
      <a class="auth-home-link" href="index.html"><span aria-hidden="true">←</span> 홈으로</a>
      <span class="auth-toggle" data-theme-slot></span>

      <div class="auth-card auth-card--wide">
        <div class="auth-card__head">
          <p class="auth-card__brand">노영오 <span>TRAVEL LOG</span></p>
          <h1 class="auth-card__title">회원가입</h1>
          <p class="auth-card__sub">
            탑승자 정보를 등록하고 여정에 합류하세요 <span aria-hidden="true">🛫</span>
          </p>
        </div>

        <div class="auth-card__body">
          <form id="signupForm" action="signUpResult.html" method="get">
            <fieldset class="auth-sec">
              <legend>계정 정보</legend>
              <div class="auth-field">
                <label for="userId">아이디 <span class="req">필수</span></label>
                <input
                  type="text"
                  id="userId"
                  name="userId"
                  placeholder="4~15자 영문+숫자"
                  autocomplete="username"
                  aria-describedby="userId-help"
                  required
                  aria-required="true"
                />
                <span class="hint" id="userId-help">영문과 숫자 조합으로 4자 이상 15자 이하.</span>
              </div>
              <div class="auth-field">
                <label for="password">비밀번호 <span class="req">필수</span></label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="영문+숫자 8자 이상"
                  autocomplete="new-password"
                  aria-describedby="password-help"
                  required
                  aria-required="true"
                />
                <span class="hint" id="password-help">영문과 숫자를 함께 포함해 8자 이상으로 입력하세요.</span>
              </div>
              <div class="auth-field">
                <label for="email">이메일</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="example@skala.com"
                  autocomplete="email"
                />
              </div>
            </fieldset>

            <fieldset class="auth-sec">
              <legend>개인 프로필</legend>
              <div class="auth-field">
                <label for="name">이름</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="홍길동"
                  autocomplete="name"
                  maxlength="20"
                />
              </div>
              <div class="auth-field">
                <label for="birth">생년월일</label>
                <input type="date" id="birth" name="birth" autocomplete="bday" />
              </div>

              <fieldset class="auth-group">
                <legend>성별</legend>
                <div class="auth-choices">
                  <label class="auth-choice">
                    <input type="radio" name="gender" value="male" checked /> 남성
                  </label>
                  <label class="auth-choice">
                    <input type="radio" name="gender" value="female" /> 여성
                  </label>
                  <label class="auth-choice">
                    <input type="radio" name="gender" value="none" /> 선택 안 함
                  </label>
                </div>
              </fieldset>

              <fieldset class="auth-group">
                <legend>관심 분야 (중복 선택 가능)</legend>
                <div class="auth-choices auth-choices--col">
                  <label class="auth-choice">
                    <input type="checkbox" name="interests" value="frontend" />
                    웹 프론트엔드 (<span lang="en">Vue.js/HTML</span>)
                  </label>
                  <label class="auth-choice">
                    <input type="checkbox" name="interests" value="uiux" />
                    <span lang="en">UI/UX</span> 디자인 표준
                  </label>
                  <label class="auth-choice">
                    <input type="checkbox" name="interests" value="backend" />
                    백엔드 &amp; 데이터베이스
                  </label>
                  <label class="auth-choice">
                    <input type="checkbox" name="interests" value="cloud" />
                    클라우드 &amp; 인프라
                  </label>
                </div>
              </fieldset>

              <div class="auth-field">
                <label for="referral">가입 경로</label>
                <div class="auth-select">
                  <select id="referral" name="referral">
                    <option value="">-- 선택해 주세요 --</option>
                    <option value="search">검색 엔진</option>
                    <option value="friend">지인 추천</option>
                    <option value="sns">SNS 광고</option>
                    <option value="etc">기타</option>
                  </select>
                </div>
              </div>
            </fieldset>

            <fieldset class="auth-sec">
              <legend>자기소개</legend>
              <div class="auth-field">
                <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사</label>
                <textarea
                  id="intro"
                  name="intro"
                  rows="4"
                  maxlength="200"
                  placeholder="여기에 내용을 입력하세요 (최대 200자)"
                  aria-describedby="intro-help"
                ></textarea>
                <span class="hint" id="intro-help">최대 200자까지 입력할 수 있습니다.</span>
              </div>
            </fieldset>

            <p id="signupMsg" class="auth-msg" role="alert"></p>

            <div class="auth-actions">
              <button type="submit" class="auth-submit">동의하고 회원가입</button>
              <button type="reset" class="auth-reset">다시 작성</button>
            </div>
          </form>

          <p class="auth-alt">이미 회원이신가요? <a href="login.html">로그인</a></p>
          <a class="auth-back" href="index.html">← 홈으로</a>
        </div>
      </div>
    </main>
  </body>
</html>
