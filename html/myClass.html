<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'"
    />
    <title>강의 일정 · 노영오 여행 일지</title>
    <script src="../script/theme.js"></script>
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/chrome.css" />
    <link rel="stylesheet" href="../css/intro.css" />
    <link rel="stylesheet" href="../css/myClass.css" />
    <script type="module" src="../script/myClass.js"></script>
  </head>
  <body data-intro="CLASS">
    <header data-site-header></header>

    <main id="main" class="schedule">
      <div class="schedule__intro">
        <h1>강의 일정 <span class="eyebrow">FLIGHT SCHEDULE</span></h1>
        <p>
          SKALA 4반(205호 · 광주) 주간 시간표입니다. 달력에서 날짜를 고르거나 좌우로 넘겨 주차별 강의를
          확인하세요.
        </p>
        <p class="schedule__note"><mark>교수님은 4반 기준입니다.</mark></p>
      </div>

      <div class="schedule__grid">
        <aside class="cal" aria-label="주차 선택 달력">
          <div class="cal__bar">
            <button type="button" class="cal__nav" data-cal-prev aria-label="이전 달">‹</button>
            <p class="cal__title" id="calTitle" aria-live="polite">달력</p>
            <button type="button" class="cal__nav" data-cal-next aria-label="다음 달">›</button>
          </div>
          <div class="cal__grid" id="calGrid"></div>
          <p class="cal__hint">표시된 날짜를 누르면 그 주 강의가 나타납니다.</p>
        </aside>

        <section class="week" aria-labelledby="weekHeading">
          <div class="week__bar">
            <button type="button" class="week__nav" data-week-prev>
              <span aria-hidden="true">◀</span> 이전 주
            </button>
            <h2 class="week__title" id="weekHeading">주간 일정</h2>
            <button type="button" class="week__nav" data-week-next>
              다음 주 <span aria-hidden="true">▶</span>
            </button>
          </div>
          <ol class="board" id="board" aria-live="polite"></ol>
        </section>
      </div>
    </main>

    <footer data-site-foot></footer>
  </body>
</html>
