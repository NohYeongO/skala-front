<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https://api.open-meteo.com; img-src 'self' data:; object-src 'none'; base-uri 'self'"
    />
    <title>Welcome SKALA · 노영오 여행 일지</title>
    <script src="../script/theme.js"></script>
    <link rel="preload" href="../fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/home.css" />
    <script type="module" src="../script/home.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">본문 바로가기</a>
    <header data-site-header class="site-header">
      <a class="brand" href="index.html"><b>노영오</b><span class="brand__sub">TRAVEL LOG</span></a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <ul>
          <li><a href="myProfile.html">나의 소개</a></li>
          <li><a href="holiday.html">휴일 일과</a></li>
          <li><a href="myClass.html">강의 일정</a></li>
          <li><a href="myTrip.html">나의 여행지</a></li>
        </ul>
      </nav>
      <div class="site-header__actions">
        <span class="auth" id="authArea"><a class="btn-login" href="login.html">로그인</a><a class="btn-signup" href="signUp.html">회원가입</a></span>
        <span data-theme-slot></span>
      </div>
    </header>

    <main id="main">
      <h1 class="sr-only">노영오 여행 일지 · 세계 여행 궤적 포털</h1>
      <section class="hero" aria-label="여행 궤적">
        <div class="hero__map-cell">
          <div class="hero__map" id="map">
            <img class="hero__img" src="../media/world-map.png" alt="파란빛으로 빛나는 세계 지도" />
            <!-- 마커·항로·비행기는 journeyMap이 주입 -->
          </div>
        </div>
        <aside class="hero__log" id="log"></aside>
        <p id="logStatus" class="sr-only" aria-live="polite"></p>

        <div class="hero__controls">
          <button type="button" id="playJourney" class="btn-play" aria-pressed="false">
            <span class="btn-play__icon" aria-hidden="true">▶</span>
            <span class="btn-play__label">여정 재생</span>
          </button>
          <ol class="timeline" aria-label="연도별 여정">
            <li><button type="button" data-year="2020">2020</button></li>
            <li><button type="button" data-year="2023">2023</button></li>
            <li><button type="button" data-year="2025">2025</button></li>
            <li><button type="button" data-year="2026">2026</button></li>
          </ol>
        </div>
      </section>

      <section class="deck" aria-labelledby="deck-heading" data-reveal>
        <h2 id="deck-heading">둘러보기 <span class="eyebrow">EXPLORE</span></h2>
        <ul class="deck__grid">
          <li class="deck__card">
            <a href="myProfile.html"><b>나의 소개</b><span>취향·올해 목표·나를 설명하는 세 단어</span></a>
          </li>
          <li class="deck__card">
            <a href="holiday.html"><b>휴일 일과</b><span>아침부터 저녁까지 이어지는 타임라인</span></a>
          </li>
          <li class="deck__card">
            <a href="myClass.html"><b>강의 일정</b><span>이번 주 SKALA 4반 주간 시간표</span></a>
          </li>
          <li class="deck__card">
            <a href="myTrip.html"><b>나의 여행지</b><span>사진·음악·브이로그를 담은 앨범</span></a>
          </li>
        </ul>
      </section>

      <section class="games arcade" aria-labelledby="games-heading">
        <h2 id="games-heading">MINI GAME <span aria-hidden="true">🕹️</span> <span class="eyebrow">GAME CENTER</span></h2>
        <div class="arcade__grid">
          <button type="button" id="upDownBtn" class="cabinet">
            <span class="cabinet__icon" aria-hidden="true">🎮</span>
            <span class="cabinet__name">업다운 게임</span>
            <span class="cabinet__cta">PLAY ▸</span>
          </button>
          <button type="button" id="gradeBtn" class="cabinet">
            <span class="cabinet__icon" aria-hidden="true">📊</span>
            <span class="cabinet__name">성적 계산기</span>
            <span class="cabinet__cta">PLAY ▸</span>
          </button>
          <button type="button" id="bagBtn" class="cabinet">
            <span class="cabinet__icon" aria-hidden="true">🎒</span>
            <span class="cabinet__name">내 가방 보기</span>
            <span class="cabinet__cta">PLAY ▸</span>
          </button>
        </div>
      </section>
    </main>

    <footer data-site-foot></footer>

    <dialog class="photo-modal" id="photoModal" aria-labelledby="photo-modal-cap">
      <form method="dialog">
        <button type="submit" class="photo-modal__close" value="close" aria-label="닫기">✕</button>
      </form>
      <figure class="photo-modal__fig">
        <img id="photo-modal-img" src="" alt="" />
        <span class="photo-modal__stamp" id="photo-modal-stamp" aria-hidden="true"></span>
        <figcaption id="photo-modal-cap" class="photo-modal__cap"></figcaption>
      </figure>
    </dialog>
  </body>
</html>
