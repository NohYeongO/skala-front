<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta http-equiv="refresh" content="1; url=html/index.html" />
    <title>Welcome SKALA</title>
    <script>
      // 사이트에서 고른 테마(수동 토글)를 로딩 화면에도 적용한다
      try {
        const theme = localStorage.getItem("skala-theme");
        if (theme === "light" || theme === "dark") document.documentElement.dataset.theme = theme;
      } catch (e) {}
    </script>
    <style>
      :root {
        --bg: radial-gradient(circle at 50% 38%, #16294d, #0a1120 70%);
        --text: #fff;
        --accent: #f5c451;
        --track: rgba(255, 255, 255, 0.2);
        --hint: rgba(255, 255, 255, 0.72);
      }
      :root[data-theme="light"] {
        --bg: radial-gradient(circle at 50% 38%, #dbe8ff, #f2f5ff 70%);
        --text: #1c2a4d;
        --accent: #b45309;
        --track: rgba(28, 42, 77, 0.15);
        --hint: rgba(28, 42, 77, 0.7);
      }
      @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) {
          --bg: radial-gradient(circle at 50% 38%, #dbe8ff, #f2f5ff 70%);
          --text: #1c2a4d;
          --accent: #b45309;
          --track: rgba(28, 42, 77, 0.15);
          --hint: rgba(28, 42, 77, 0.7);
        }
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        text-align: center;
      }
      .eyebrow {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        color: var(--accent);
      }
      h1 {
        margin: 0.4rem 0 1.4rem;
        font-size: 2rem;
      }
      .bar {
        width: min(320px, 70vw);
        height: 4px;
        margin: 0 auto 0.9rem;
        background: var(--track);
        border-radius: 999px;
        overflow: hidden;
      }
      .fill {
        display: block;
        height: 100%;
        width: 0;
        background: var(--accent);
        animation: fill 0.9s ease forwards;
      }
      @keyframes fill {
        to {
          width: 100%;
        }
      }
      .hint {
        font-size: 0.85rem;
        color: var(--hint);
      }
      a {
        color: var(--accent);
      }
      @media (prefers-reduced-motion: reduce) {
        .fill {
          animation: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">BOARDING PASS</p>
      <h1>SKALA 노영오 포털 입장 중…</h1>
      <div class="bar" aria-hidden="true"><span class="fill"></span></div>
      <p class="hint">바로 이동하지 않으면 <a href="html/index.html">여기</a>를 눌러주세요.</p>
    </main>
  </body>
</html>
